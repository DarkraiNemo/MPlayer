<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&display=swap" rel="stylesheet">
	<link rel="icon" type="image/x-icon" href="./srcs/MPlayer.svg">
    <title>MPlayer</title>
</head>
<body>
    <div id="loading-screen">
        <p>Loading...</p>
    </div>
    <header class="navbar">
        <h1 class="nav-title effect3D">
            <a class="wave">
                <span>M</span>
                <span>P</span>
                <span>l</span>
                <span>a</span>
                <span>y</span>
                <span>e</span>
                <span>r</span>
            </a>
        </h1>
        <div class="nowPlaying">
            <span id="now-playing-name">Nothing is being played..</span>
        </div>
        <nav class="nav-links">
            <a onclick="showTab('playlist')">playlist</a>
            <a onclick="showTab('visualizer')">visualizer</a>
        </nav>
    </header>
    <main>
        <aside>
            <div class="player">
                <div class="progress-container">
                    <span id="current-time">0:00</span>
                    <input type="range" id="progress-slider" min="0" max="100" value="0">
                    <span id="duration-time">0:00</span>
                </div>
                <audio id="audio-player"></audio>
                <div class="cover">
                    <div class="sourceImg">
                        <img id="cover-art" class="canvaImg" src="./srcs/MPlayer.png" alt="Album cover">
                    </div>
                </div>
                <div class="volume-container">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.1">
                </div>
                <div class="playerButtons">
                    <button id="btn-rewind" type="button">
                        <img src="./imgs/rewind.svg" alt="Retroceder">
                    </button>
                    <button id="btn-forward" type="button">
                        <img src="./imgs/forward.svg" alt="Avançar">
                    </button>
                    <button id="btn-stop" type="button">
                        <img src="./imgs/stop.svg" alt="Parar">
                    </button>
                    <button id="btn-pause" type="button">
                        <img src="./imgs/pause.svg" alt="Pausar">
                    </button>
                    <button id="btn-play" type="button">
                        <img src="./imgs/play.svg" alt="Tocar">
                    </button>
                    <button id="btn-loop" type="button">
                        <img src="./imgs/loop.svg" alt="Loop">
                    </button>
                    <button id="btn-shuffle" type="button">
                        <img src="./imgs/shuffle.svg" alt="Shuffle">
                    </button>
                </div>
            </div>
        </aside>
        <section id="tab-welcome">
            <article>
                <p>Welcome! Drop any folder with the songs to start listening!</p>
            </article>
        </section>
        <section id="tab-playlist">
            <article class="playlist-article">
                <p>No playlist yet, drop some!</p>
            </article>
        </section>
        <section id="tab-visualizer">
            <article class="visualizer-wrap">
                <canvas id="visualizer-canvas"></canvas>
            </article>
        </section>
    </main>
    <footer style="user-select: none;">
        <small>&copy; <span id="year"></span> MPlayer - Made with 💙 by <a href="https://darkrainemo.github.io" target="_blank">Darkgrey_</a></small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="./scripts/script.js"></script>
    <script src="./scripts/player.js"></script>
</body>
</html>
